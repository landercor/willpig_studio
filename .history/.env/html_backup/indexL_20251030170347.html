<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse | Willpig Studio</title>
  <link rel="stylesheet" href="style1.2.css" />
  <link rel="icon" href="/public/img/img.ico/logo.ico">
</head>
<body>
  <header class="Logps-header">
    <div class="logo" onclick="window.location.href='index.html'">
    <figure class="logo-LTRA-fig">
        <img src="/public/img/img.ico/LTRA.logo-resol.png" alt="Willpig Studio Logo">
      </figure>
      <span class="logo-text"></span>
    </div>
  <div class="row"></div>

  <main class="register-container">
    <div class="register-card">
      <h1>Crear una cuenta</h1>
      <p>Únete a Willpig Studio y comparte tus historias ilustradas.</p>

      <form action="/register" method="POST" class="register-form">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required />
        </div>
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required />
        </div>
        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" placeholder="ejemplo@email.com" required />
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" placeholder="Crea una contraseña segura" required />
        </div>

        <button type="submit" class="btn-register">Registrarse</button>
      </form>

      <p class="login-link">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
      </p>
    </div>
  </main>

    <footer>
    <div class="footer-links">
      <a href="#">Willpig-Studio Originals</a>
      <a href="#">Idioma</a>
      <a href="#">Escritores</a>
      <a href="#">Términos</a>
      <li aria-hidden="" role="none">|</li>
      <a href="#">Privacidad</a>
      <a href="#">Accesibilidad</a>
      <a href="#">Ayuda</a>
    </div>
    <p>© 2025 Willpig Studio</p>
  </footer>
</body>
</html>
